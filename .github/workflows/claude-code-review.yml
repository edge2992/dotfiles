name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only run on PRs from the same repo (not forks)
# This prevents external users from triggering the workflow
# and consuming your API key
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR. Focus on:
            - chezmoi naming conventions (dot_, private_dot_, .tmpl suffixes)
            - Template syntax correctness ({{ }}) in .tmpl files
            - Shell script quality in run_once_install-*.sh.tmpl
            - Security: no secrets, API keys, or credentials committed
            - Cross-platform compatibility (Linux/macOS)

            Be concise. Only flag real issues, not style preferences.
