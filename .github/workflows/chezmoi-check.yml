name: chezmoi check

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck on .sh.tmpl files
        run: |
          exit_code=0
          for f in run_once_install-*.sh.tmpl; do
            echo "::group::shellcheck $f"
            # Strip chezmoi template directives before running shellcheck
            sed '/^{{/d' "$f" | shellcheck -s bash -e SC1091 - || exit_code=1
            echo "::endgroup::"
          done
          exit "$exit_code"

  chezmoi-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install chezmoi and apply dotfiles (skip scripts)
        env:
          GIT_EMAIL: "ci@example.com"
          GIT_NAME: "CI"
          CI: "true"
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- init --apply --exclude=scripts -S .

      - name: Verify key config files exist
        run: |
          files=(
            "$HOME/.zshrc"
            "$HOME/.zshenv"
            "$HOME/.gitconfig"
            "$HOME/.tmux.conf"
            "$HOME/.ideavimrc"
            "$HOME/.config/nvim/init.lua"
            "$HOME/.config/nvim/lua/edgissa/core/init.lua"
            "$HOME/.config/nvim/lua/edgissa/lazy.lua"
          )
          fail=0
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              fail=1
            fi
          done
          exit "$fail"

  nvim-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        nvim-version: [v0.11.5, stable, nightly]
        include:
          - nvim-version: nightly
            continue-on-error: true
    continue-on-error: ${{ matrix.continue-on-error || false }}
    name: nvim-health (${{ matrix.nvim-version }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim (${{ matrix.nvim-version }})
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - name: Install chezmoi and apply dotfiles (skip scripts)
        env:
          GIT_EMAIL: "ci@example.com"
          GIT_NAME: "CI"
          CI: "true"
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- init --apply --exclude=scripts -S .

      - name: Verify Neovim Lua config loads without errors
        run: |
          nvim --version | head -1
          nvim --headless +"lua require('edgissa.core')" +qa 2>&1 | tee /tmp/nvim-output.log
          if grep -q 'E5108' /tmp/nvim-output.log; then
            echo "Neovim config has Lua errors!"
            exit 1
          fi
          echo "Neovim config loaded successfully"
